<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>

<body data-page="collab">

  <section class="page-head">
    <div class="page-head__bg"></div>

      <span class="eyebrow">Collaboration</span>
      <h1>Let's build something</h1>

  <section class="section section--tight">
    <div class="wrap">
      <div class="collab-grid" id="collabAreas"></div>

  <section class="section section--tight">
    <div class="wrap">
      <div class="cta-banner reveal center" style="text-align:center">

        <p style="margin-inline:auto">The fastest way to reach me is email. I read everything, and I try to reply

        <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
          <a class="btn btn--primary" id="collabEmailBtn" href="#">Email me <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m3.5 7 8.5 6 8.5-6"/></svg></a>

        <p class="mono muted" style="margin:1.2rem auto 0;font-size:.9rem"><span id="collabEmail"></span></p>
